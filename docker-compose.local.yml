# Local stack mirroring render-templates/dify-render-template/render.yaml
# Usage: docker compose -f docker-compose.local.yml up -d
# UI: http://localhost:3000  API: http://localhost:5001

x-dify-api-env: &dify-api-env
  DEPLOY_ENV: PRODUCTION
  MIGRATION_ENABLED: "true"
  LOG_LEVEL: INFO
  SECRET_KEY: local-dev-secret-key-change-in-production
  INIT_PASSWORD: difyai123456
  CONSOLE_API_URL: http://localhost:5001
  CONSOLE_WEB_URL: http://localhost:3000
  SERVICE_API_URL: http://localhost:5001
  APP_WEB_URL: http://localhost:3000
  FILES_URL: http://localhost:5001
  INTERNAL_FILES_URL: http://api:5001
  DB_TYPE: postgresql
  DB_USERNAME: postgres
  DB_PASSWORD: difyai123456
  DB_HOST: db
  DB_PORT: "5432"
  DB_DATABASE: dify
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: difyai123456
  CELERY_BROKER_URL: redis://:difyai123456@redis:6379/1
  VECTOR_STORE: pgvector
  PGVECTOR_HOST: db
  PGVECTOR_PORT: "5432"
  PGVECTOR_USER: postgres
  PGVECTOR_PASSWORD: difyai123456
  PGVECTOR_DATABASE: dify
  STORAGE_TYPE: opendal
  OPENDAL_SCHEME: fs
  OPENDAL_FS_ROOT: storage

services:
  init_permissions:
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        mkdir -p /app/api/storage && chown -R 1001:1001 /app/api/storage
    volumes:
      - dify_storage:/app/api/storage
    restart: "no"

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: difyai123456
      POSTGRES_DB: dify
    volumes:
      - dify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dify"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass difyai123456
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "difyai123456", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  db_init:
    image: pgvector/pgvector:pg16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: difyai123456
    entrypoint:
      - sh
      - -c
      - psql -h db -U postgres -d dify -c 'CREATE EXTENSION IF NOT EXISTS vector;'
    restart: "no"

  api:
    image: langgenius/dify-api:1.14.2
    restart: unless-stopped
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      <<: *dify-api-env
      MODE: api
    volumes:
      - dify_storage:/app/api/storage

  worker:
    image: langgenius/dify-api:1.14.2
    restart: unless-stopped
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      <<: *dify-api-env
      MODE: worker
    volumes:
      - dify_storage:/app/api/storage

  web:
    image: langgenius/dify-web:1.14.2
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      CONSOLE_API_URL: http://localhost:5001
      APP_API_URL: http://localhost:5001

volumes:
  dify_pgdata:
  dify_storage:
